services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: yolo-model-factory-api:${IMAGE_TAG:-latest}
    init: true
    mem_limit: ${API_MEMORY_LIMIT:-10g}
    cpus: ${API_CPU_LIMIT:-6}
    shm_size: ${API_SHM_SIZE:-2gb}
    pids_limit: ${API_PIDS_LIMIT:-256}
    environment:
      YOLO_FACTORY_SYSTEM_CONFIG: /app/configs/system.docker.yaml
      YOLO_FACTORY_TASK_CONFIG_DIR: /data/task-configs
      YOLO_FACTORY_MODEL_DIR: /models
      CPU_TRAINING_THREADS: ${CPU_TRAINING_THREADS:-4}
      CPU_DETECT_MAX_BATCH: ${CPU_DETECT_MAX_BATCH:-4}
      CPU_SEGMENT_MAX_BATCH: ${CPU_SEGMENT_MAX_BATCH:-1}
      CPU_TRAINING_MAX_IMAGE_SIZE: ${CPU_TRAINING_MAX_IMAGE_SIZE:-640}
      GPU_DETECT_MAX_BATCH: ${GPU_DETECT_MAX_BATCH:-8}
      GPU_SEGMENT_MAX_BATCH: ${GPU_SEGMENT_MAX_BATCH:-2}
      GPU_TRAINING_MAX_IMAGE_SIZE: ${GPU_TRAINING_MAX_IMAGE_SIZE:-1280}
      GPU_ALLOWED_DEVICES: ${GPU_ALLOWED_DEVICES:-}
      YOLO_FACTORY_MAX_UPLOAD_BYTES: ${YOLO_FACTORY_MAX_UPLOAD_BYTES:-2147483648}
      TRAINING_MIN_FREE_DISK_GB: ${TRAINING_MIN_FREE_DISK_GB:-8}
      TRAINING_MIN_FREE_DISK_PERCENT: ${TRAINING_MIN_FREE_DISK_PERCENT:-10}
    volumes:
      - ${DATA_DIR:-./docker-data}:/data
      - ${MODEL_DIR:-./models}:/models:ro
    healthcheck:
      test: [CMD, curl, --fail, --silent, http://127.0.0.1:8000/api/health]
      interval: 20s
      timeout: 5s
      start_period: 60s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: yolo-model-factory-web:${IMAGE_TAG:-latest}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - ${WEB_PORT:-8080}:80
    healthcheck:
      test: [CMD, wget, -q, -O, /dev/null, http://127.0.0.1/healthz]
      interval: 20s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
