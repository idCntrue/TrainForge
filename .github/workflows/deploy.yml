name: Test and deploy Docker

on:
  workflow_dispatch:

concurrency:
  group: trainforge-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test -- --run
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  deploy:
    needs: test
    runs-on: ubuntu-22.04
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Package deploy source
        run: tar --exclude=.git --exclude=.env --exclude=frontend/node_modules --exclude=frontend/dist -czf "/tmp/yolo-model-factory-${GITHUB_SHA}.tar.gz" .
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Upload source package
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: scp -i ~/.ssh/deploy_key "/tmp/yolo-model-factory-${GITHUB_SHA}.tar.gz" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"
      - name: Deploy and verify
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p /opt/yolo_model_factory && tar -xzf /tmp/yolo-model-factory-${GITHUB_SHA}.tar.gz -C /opt/yolo_model_factory && chmod +x /opt/yolo_model_factory/docker/deploy.sh && cd /opt/yolo_model_factory && ./docker/deploy.sh ${GITHUB_SHA} && rm -f /tmp/yolo-model-factory-${GITHUB_SHA}.tar.gz"
