services:
  api:
    build:
      context: .
      dockerfile: docker/api.gpu.Dockerfile
    image: yolo-model-factory-api-gpu:${IMAGE_TAG:-latest}
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
